name: NanoClaw
options:
  bundleIdPrefix: com.nanoclaw
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40"
settings:
  SWIFT_VERSION: "6.0"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"
targets:
  NanoClaw:
    type: application
    platform: macOS
    sources:
      - path: .
        excludes:
          - project.yml
          - "*.xcodeproj/**"
    settings:
      CODE_SIGN_ENTITLEMENTS: NanoClaw.entitlements
      PRODUCT_BUNDLE_IDENTIFIER: com.nanoclaw.desktop
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_GENERATION_MODE: GeneratedFile
      INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
      INFOPLIST_KEY_CFBundleDisplayName: NanoClaw
      SWIFT_STRICT_CONCURRENCY: minimal
